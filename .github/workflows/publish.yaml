name: Publish NPM Package

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Get package version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          LATEST=$(npm view aark-react-modalify version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT"
          echo "Latest version: $LATEST"

      - name: Skip if version already exists
        if: steps.version.outputs.current == steps.version.outputs.latest
        run: echo "Version ${{ steps.version.outputs.current }} already published. Skipping..."

      - name: Build
        if: steps.version.outputs.current != steps.version.outputs.latest
        run: bun run build

      - name: Publish
        if: steps.version.outputs.current != steps.version.outputs.latest
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag Release
        if: steps.version.outputs.current != steps.version.outputs.latest
        run: |
          git config --local user.email "sumonsbgc@gmail.com"
          git config --local user.name "Mohammad Sumon"
          git tag v${{ steps.version.outputs.current }}
          git push origin --tags
